version: "3.1"

normalization:
  statuses:
    present: ["present", "positive", "yes", "true", "documented", "reported", "noted", "active"]
    absent: ["absent", "negative", "no", "false", "denied", "denies", "none", "ruled out", "not present"]
    not_listed: ["not_listed", "not listed", "not mentioned", "not documented", "unknown", "unclear", "n/a", "na", ""]

negation_scope:
  triggers: ["denies", "denied", "deny", "no", "without", "without evidence of", "no evidence of", "negative for", "ruled out", "has no", "does not have"]
  boundary_terms: ["but", "however", "although", "though", "except"]
  max_scope_characters: 260

number_words:
  zero: 0
  one: 1
  two: 2
  three: 3
  four: 4
  five: 5
  six: 6
  seven: 7
  eight: 8
  nine: 9
  ten: 10
  eleven: 11
  twelve: 12
  thirteen: 13
  fourteen: 14
  fifteen: 15
  sixteen: 16
  seventeen: 17
  eighteen: 18
  nineteen: 19
  twenty: 20
  thirty: 30
  forty: 40
  fifty: 50

extractors:
  visit_type:
    type: "categorical"
    output_field: "visit_type"
    evidence_field: "visit_type_evidence"
    overwrite: true
    priority: ["post_op", "device_programming", "medication_management", "initial_visit", "follow_up"]
    categories:
      post_op:
        terms: ["postoperative follow-up", "postoperative follow up", "post-operative follow-up", "post-operative follow up", "six-month postoperative follow-up", "postoperative visit", "post-op visit", "post op visit", "wound check"]
      device_programming:
        terms: ["programming follow-up", "programming follow up", "programming visit", "rns programming", "vns programming", "dbs programming", "device programming", "device interrogation", "stimulation adjustment", "settings were reviewed", "settings were adjusted"]
      medication_management:
        terms: ["routine medication management", "medication management follow-up", "medication management follow up", "medication management", "medication adjustment", "dose increase", "dose decrease", "dose reduction", "medication refill"]
      initial_visit:
        terms: ["initial visit", "new patient", "initial evaluation"]
      follow_up:
        terms: ["routine follow-up", "routine follow up", "follow-up visit", "follow up visit"]

  device_type:
    type: "categorical"
    output_field: "device_type"
    overwrite: true
    default: "unknown"
    allow_multiple_as: "multiple"
    ignore_negated: true
    priority: ["VNS", "RNS", "DBS"]
    categories:
      VNS:
        terms: ["vns", "vagus nerve stimulation", "vagus nerve stimulator", "vagal nerve stimulation", "vagal nerve stimulator"]
      RNS:
        terms: ["rns", "responsive neurostimulation", "responsive neurostimulator", "neuropace", "neurostimulator"]
      DBS:
        terms: ["dbs", "deep brain stimulation", "deep brain stimulator"]

  treatment_context:
    type: "multi_categorical"
    output_field: "treatment_context"
    evidence_field: "treatment_context_evidence"
    overwrite: true
    ignore_negated: true
    priority: ["VNS", "RNS", "DBS", "medication", "dietary", "surgical", "other"]
    preferred_evidence_terms: ["settings were reviewed", "implantation", "levetiracetam", "lacosamide", "cenobamate", "lamotrigine", "antiseizure medication", "antiseizure medications"]
    categories:
      VNS:
        terms: ["vns", "vagus nerve stimulation", "vagus nerve stimulator"]
      RNS:
        terms: ["rns", "responsive neurostimulation", "responsive neurostimulator", "neuropace", "neurostimulator"]
      DBS:
        terms: ["dbs", "deep brain stimulation", "deep brain stimulator"]
      medication:
        terms: ["medication", "medications", "antiseizure medication", "antiseizure medications", "anti-seizure medication", "anti-seizure medications", "seizure medication", "asm", "asms", "aed", "aeds", "levetiracetam", "lacosamide", "cenobamate", "lamotrigine", "oxcarbazepine", "carbamazepine", "topiramate", "zonisamide", "clobazam", "valproate", "divalproex", "phenytoin", "phenobarbital", "brivaracetam", "perampanel"]
      dietary:
        terms: ["ketogenic", "keto diet", "modified atkins", "low glycemic", "dietary therapy", "dietary treatment"]
      surgical:
        terms: ["resection", "lobectomy", "laser ablation", "litt", "lesionectomy", "hemispherectomy", "corpus callosotomy", "implantation", "surgery"]

  baseline_seizure_frequency:
    type: "regex_fields"
    evidence_field: "baseline_seizure_frequency_evidence"
    preferred_evidence_terms: ["baseline", "before", "prior to", "preoperative", "pre-op", "pre-implant", "daily", "per week", "per month"]
    sentence_cues: ["prior to", "before", "baseline", "pre-implant", "preimplant", "pre-op", "preoperative", "before implantation", "before surgery", "before treatment", "before the medication change", "experiencing daily seizures", "daily seizures"]
    patterns:
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*day"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_day"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:times|x)\\s*(?:per|a|each|every)?\\s*day"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_day"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*week"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_week"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:times|x)\\s*(?:per|a|each|every)?\\s*week"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_week"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*month"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_month"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:times|x)\\s*(?:per|a|each|every)?\\s*month"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_month"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*year"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_year"
      - regex: "\\bexperiencing daily seizures?\\b|\\bdaily seizures?\\b|\\bseizures? daily\\b"
        fields:
          baseline_seizure_frequency_value: "daily"
          baseline_seizure_frequency_unit: "qualitative"
      - regex: "\\bfrequent seizures?\\b"
        fields:
          baseline_seizure_frequency_value: "frequent"
          baseline_seizure_frequency_unit: "qualitative"
      - regex: "\\boccasional seizures?\\b|\\boccasional breakthrough events?\\b"
        fields:
          baseline_seizure_frequency_value: "occasional"
          baseline_seizure_frequency_unit: "qualitative"
      - regex: "\\brare seizures?\\b"
        fields:
          baseline_seizure_frequency_value: "rare"
          baseline_seizure_frequency_unit: "qualitative"

  seizure_reduction:
    type: "regex_fields"
    evidence_field: "seizure_reduction_evidence"
    preferred_evidence_terms: ["reduction", "reduced", "improved", "substantially improved", "unchanged", "stable", "worsened", "seizure frequency"]
    sentence_cues: ["seizure", "seizures", "seizure frequency", "events", "breakthrough events", "reduction", "reduced", "decrease", "decreased", "improved", "improvement", "substantially improved", "better", "stable", "unchanged", "worsened", "seizure-free", "seizure free"]
    patterns:
      - regex: "At this (?P<timepoint>[^,.]+?follow-up).*?(?P<value>\\d+(?:\\.\\d+)?)\\s*%"
        fields:
          seizure_reduction_value: "{value}"
          seizure_reduction_unit: "percent"
          seizure_reduction_timepoint: "{timepoint}"
      - regex: "At this (?P<timepoint>[^,.]+?follow up).*?(?P<value>\\d+(?:\\.\\d+)?)\\s*%"
        fields:
          seizure_reduction_value: "{value}"
          seizure_reduction_unit: "percent"
          seizure_reduction_timepoint: "{timepoint}"
      - regex: "(?P<value>\\d+(?:\\.\\d+)?)\\s*%\\s*(?:reduction|decrease|improvement)"
        fields:
          seizure_reduction_value: "{value}"
          seizure_reduction_unit: "percent"
      - regex: "(?P<value>\\d+(?:\\.\\d+)?)\\s*%"
        fields:
          seizure_reduction_value: "{value}"
          seizure_reduction_unit: "percent"
      - regex: "(?P<timepoint>Since [^,.]+? ago),?\\s*seizures? are unchanged"
        fields:
          seizure_reduction_value: "unchanged"
          seizure_reduction_unit: "qualitative"
          seizure_reduction_timepoint: "{timepoint}"
      - regex: "(?P<timepoint>Since [^,.]+? ago),?\\s*seizure frequency has substantially improved"
        fields:
          seizure_reduction_value: "improved"
          seizure_reduction_unit: "qualitative"
          seizure_reduction_timepoint: "{timepoint}"
      - regex: "(?P<timepoint>Since [^,.]+? ago).*?(?:substantially improved|improved|improvement|better|reduction|reduced|decrease|decreased)"
        fields:
          seizure_reduction_value: "improved"
          seizure_reduction_unit: "qualitative"
          seizure_reduction_timepoint: "{timepoint}"
      - regex: "(?P<timepoint>Since [^,.]+? ago).*?(?:unchanged|stable|remained stable|no change)"
        fields:
          seizure_reduction_value: "unchanged"
          seizure_reduction_unit: "qualitative"
          seizure_reduction_timepoint: "{timepoint}"
      - regex: "seizure frequency has substantially improved|seizure frequency improved|substantially improved|improved|improvement|better|reduction|reduced|decrease|decreased"
        fields:
          seizure_reduction_value: "improved"
          seizure_reduction_unit: "qualitative"
      - regex: "seizures? are unchanged|unchanged|stable|remained stable|no change"
        fields:
          seizure_reduction_value: "unchanged"
          seizure_reduction_unit: "qualitative"
      - regex: "worsened|worse|increased|increasing"
        fields:
          seizure_reduction_value: "worsened"
          seizure_reduction_unit: "qualitative"
      - regex: "seizure-free|seizure free"
        fields:
          seizure_reduction_value: "seizure-free"
          seizure_reduction_unit: "qualitative"

