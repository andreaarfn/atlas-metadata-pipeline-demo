version: "3.3"

normalization:
  statuses:
    present: ["present", "positive", "yes", "true", "documented", "reported", "noted", "active"]
    absent: ["absent", "negative", "no", "false", "denied", "denies", "none", "ruled out", "not present"]
    not_listed: ["not_listed", "not listed", "not mentioned", "not documented", "unknown", "unclear", "n/a", "na", ""]

table_parsing:
  enabled: true
  delimiters:
    - "|"
    - "\t"
    - "multi_space"
  minimum_columns: 2
  minimum_rows: 1
  ignore_separator_rows: true

table_extractors:
  psychometric_scores:
    type: "table_fields"
    section_cues:
      - neuropsychological
      - neuropsychology
      - psychometric
      - cognitive testing
      - psychological testing
      - WAIS
      - WISC
      - WRAT
      - HVLT
      - BVMT
      - Trail
      - Stroop
      - RCFT
      - Boston Naming
      - JLO

    row_label_headers:
      - measure
      - test
      - subtest
      - domain
      - index

    column_mappings:
      standard_score:
        - SS
        - standard score
        - index score
        - composite score
      scaled_score:
        - scaled score
        - scaled
      t_score:
        - T Score
        - T
        - T-score
        - T=
      percentile:
        - Percentile
        - percentile rank
        - "%ile"
        - "%-ile"
        - PR

    assignments:
      "{prefix}_score_value": "{value}"
      "{prefix}_score_type": "{value_type}"

    row_mappings:
      verbal_comprehension:
        - Similarities
      perceptual_reasoning:
        - Block Design
      working_memory:
        - Digit Span
        - Digits Forward
        - Digits Sequencing
        - Digits Backward
      processing_speed:
        - Coding
      attention:
        - Part A
        - Trail Making Part A
        - Trails A
      executive_function:
        - Part B
        - Trail Making Part B
        - Trails B
        - Color/Word
      memory:
        - Total Trials 1-3
        - Retention
        - Logical Memory I
        - Logical Memory II
        - Logical Memory Recognition
      language:
        - Word Reading
        - Total Correct
        - Complex Ideation
      visual_spatial:
        - Copy
      visuospatial:
        - Total Score

psychometric:
  classification_source: "AACN"
  allowed_score_types:
    - standard_score
    - iq_score
    - index_score
    - t_score
    - scaled_score
    - z_score
    - percentile
  allowed_classifications:
    - Exceptionally High
    - Above Average
    - High Average
    - Average
    - Low Average
    - Below Average
    - Exceptionally Low
    - not_listed

conversions:
  aacn_psychometric:
    standard_score:
      ranges:
        - {min: 130, max: null, label: "Exceptionally High"}
        - {min: 120, max: 129, label: "Above Average"}
        - {min: 110, max: 119, label: "High Average"}
        - {min: 90, max: 109, label: "Average"}
        - {min: 80, max: 89, label: "Low Average"}
        - {min: 70, max: 79, label: "Below Average"}
        - {min: null, max: 69, label: "Exceptionally Low"}
    iq_score:
      use_ranges_from: "standard_score"
    index_score:
      use_ranges_from: "standard_score"
    t_score:
      ranges:
        - {min: 70, max: null, label: "Exceptionally High"}
        - {min: 63, max: 69, label: "Above Average"}
        - {min: 57, max: 62, label: "High Average"}
        - {min: 43, max: 56, label: "Average"}
        - {min: 37, max: 42, label: "Low Average"}
        - {min: 30, max: 36, label: "Below Average"}
        - {min: null, max: 29, label: "Exceptionally Low"}
    scaled_score:
      ranges:
        - {min: 16, max: null, label: "Exceptionally High"}
        - {min: 14, max: 15, label: "Above Average"}
        - {min: 12, max: 13, label: "High Average"}
        - {min: 8, max: 11, label: "Average"}
        - {min: 6, max: 7, label: "Low Average"}
        - {min: 4, max: 5, label: "Below Average"}
        - {min: null, max: 3, label: "Exceptionally Low"}
    z_score:
      ranges:
        - {min: 2.00, max: null, label: "Exceptionally High"}
        - {min: 1.33, max: 1.99, label: "Above Average"}
        - {min: 0.67, max: 1.32, label: "High Average"}
        - {min: -0.66, max: 0.66, label: "Average"}
        - {min: -1.32, max: -0.67, label: "Low Average"}
        - {min: -1.99, max: -1.33, label: "Below Average"}
        - {min: null, max: -2.00, label: "Exceptionally Low"}
    percentile:
      ranges:
        - {min: 98, max: null, label: "Exceptionally High"}
        - {min: 91, max: 97, label: "Above Average"}
        - {min: 75, max: 90, label: "High Average"}
        - {min: 25, max: 74, label: "Average"}
        - {min: 9, max: 24, label: "Low Average"}
        - {min: 2, max: 8, label: "Below Average"}
        - {min: null, max: 1, label: "Exceptionally Low"}

derived_fields:
  psychometric_descriptive_classification:
    type: "range_classification"
    conversion: "aacn_psychometric"
    source: "AACN"
    value_suffix: "_score_value"
    type_suffix: "_score_type"
    output_suffix: "_descriptive_classification"
    source_suffix: "_classification_source"

negation_scope:
  triggers: ["denies", "denied", "deny", "no", "without", "without evidence of", "no evidence of", "negative for", "ruled out", "has no", "does not have"]
  boundary_terms: ["but", "however", "although", "though", "except"]
  max_scope_characters: 260

number_words:
  zero: 0
  one: 1
  two: 2
  three: 3
  four: 4
  five: 5
  six: 6
  seven: 7
  eight: 8
  nine: 9
  ten: 10
  eleven: 11
  twelve: 12
  thirteen: 13
  fourteen: 14
  fifteen: 15
  sixteen: 16
  seventeen: 17
  eighteen: 18
  nineteen: 19
  twenty: 20
  thirty: 30
  forty: 40
  fifty: 50

extractors:
  visit_type:
    type: "categorical"
    output_field: "visit_type"
    evidence_field: "visit_type_evidence"
    overwrite: true
    priority: ["post_op", "device_programming", "medication_management", "initial_visit", "follow_up"]
    categories:
      post_op:
        terms: ["postoperative follow-up", "postoperative follow up", "post-operative follow-up", "post-operative follow up", "six-month postoperative follow-up", "postoperative visit", "post-op visit", "post op visit", "wound check"]
      device_programming:
        terms: ["programming follow-up", "programming follow up", "programming visit", "rns programming", "vns programming", "dbs programming", "device programming", "device interrogation", "stimulation adjustment", "settings were reviewed", "settings were adjusted"]
      medication_management:
        terms: ["routine medication management", "medication management follow-up", "medication management follow up", "medication management", "medication adjustment", "dose increase", "dose decrease", "dose reduction", "medication refill"]
      initial_visit:
        terms: ["initial visit", "new patient", "initial evaluation"]
      follow_up:
        terms: ["routine follow-up", "routine follow up", "follow-up visit", "follow up visit"]

  device_type:
    type: "categorical"
    output_field: "device_type"
    overwrite: true
    default: "unknown"
    allow_multiple_as: "multiple"
    ignore_negated: true
    priority: ["VNS", "RNS", "DBS"]
    categories:
      VNS:
        terms: ["vns", "vagus nerve stimulation", "vagus nerve stimulator", "vagal nerve stimulation", "vagal nerve stimulator"]
      RNS:
        terms: ["rns", "responsive neurostimulation", "responsive neurostimulator", "neuropace", "neurostimulator"]
      DBS:
        terms: ["dbs", "deep brain stimulation", "deep brain stimulator"]

  treatment_context:
    type: "multi_categorical"
    output_field: "treatment_context"
    evidence_field: "treatment_context_evidence"
    overwrite: true
    ignore_negated: true
    priority: ["VNS", "RNS", "DBS", "medication", "dietary", "surgical", "other"]
    categories:
      VNS:
        terms: ["vns", "vagus nerve stimulation", "vagus nerve stimulator"]
      RNS:
        terms: ["rns", "responsive neurostimulation", "responsive neurostimulator", "neuropace", "neurostimulator"]
      DBS:
        terms: ["dbs", "deep brain stimulation", "deep brain stimulator"]
      medication:
        terms: ["medication", "medications", "antiseizure medication", "antiseizure medications", "anti-seizure medication", "anti-seizure medications", "seizure medication", "asm", "asms", "aed", "aeds", "levetiracetam", "lacosamide", "cenobamate", "lamotrigine", "oxcarbazepine", "carbamazepine", "topiramate", "zonisamide", "clobazam", "valproate", "divalproex", "phenytoin", "phenobarbital", "brivaracetam", "perampanel"]
      dietary:
        terms: ["ketogenic", "keto diet", "modified atkins", "low glycemic", "dietary therapy", "dietary treatment"]
      surgical:
        terms: ["resection", "lobectomy", "laser ablation", "litt", "lesionectomy", "hemispherectomy", "corpus callosotomy", "implantation", "surgery"]

  baseline_seizure_frequency:
    type: "regex_fields"
    evidence_field: "baseline_seizure_frequency_evidence"
    sentence_cues: ["prior to", "before", "baseline", "pre-implant", "preimplant", "pre-op", "preoperative", "before implantation", "before surgery", "before treatment", "daily seizures"]
    patterns:
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*day"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_day"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*week"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_week"
      - regex: "(?P<number>\\d+(?:\\.\\d+)?)\\s*(?:seizures?|events?|episodes?)\\s*(?:per|a|each|every)\\s*month"
        fields:
          baseline_seizure_frequency_value: "{number}"
          baseline_seizure_frequency_unit: "per_month"
      - regex: "\\bexperiencing daily seizures?\\b|\\bdaily seizures?\\b|\\bseizures? daily\\b"
        fields:
          baseline_seizure_frequency_value: "daily"
          baseline_seizure_frequency_unit: "qualitative"

  seizure_reduction:
    type: "regex_fields"
    evidence_field: "seizure_reduction_evidence"
    sentence_cues: ["seizure", "seizures", "seizure frequency", "events", "reduction", "reduced", "improved", "stable", "unchanged", "worsened", "seizure-free"]
    patterns:
      - regex: "(?P<value>\\d+(?:\\.\\d+)?)\\s*%\\s*(?:reduction|decrease|improvement)"
        fields:
          seizure_reduction_value: "{value}"
          seizure_reduction_unit: "percent"
      - regex: "seizure frequency has substantially improved|seizure frequency improved|substantially improved|improved|improvement|better|reduction|reduced|decrease|decreased"
        fields:
          seizure_reduction_value: "improved"
          seizure_reduction_unit: "qualitative"
      - regex: "seizures? are unchanged|unchanged|stable|remained stable|no change"
        fields:
          seizure_reduction_value: "unchanged"
          seizure_reduction_unit: "qualitative"
      - regex: "worsened|worse|increased|increasing"
        fields:
          seizure_reduction_value: "worsened"
          seizure_reduction_unit: "qualitative"
      - regex: "seizure-free|seizure free"
        fields:
          seizure_reduction_value: "seizure-free"
          seizure_reduction_unit: "qualitative"

  cog_memory:
    type: "status"
    status_field: "cog_memory_status"
    evidence_field: "cog_memory_evidence"
    present_terms: ["memory difficulty", "memory problems", "memory loss", "short-term memory", "short term memory", "forgetfulness", "word-finding"]
    absent_terms: ["denies memory", "denies memory problems", "no memory problems", "no memory concerns"]

  cog_attention:
    type: "status"
    status_field: "cog_attention_status"
    evidence_field: "cog_attention_evidence"
    present_terms: ["attention problems", "concentration problems", "worsening attention", "worsening concentration", "trouble focusing", "difficulty focusing", "distractibility", "attention and concentration"]
    absent_terms: ["denies problems with attention", "denies attention", "denies concentration", "no attention problems", "no concentration problems"]

  cog_processing_speed:
    type: "status"
    status_field: "cog_processing_speed_status"
    evidence_field: "cog_processing_speed_evidence"
    present_terms: ["cognitive slowing", "mental slowing", "slowed thinking", "slow processing", "brain fog"]
    absent_terms: ["denies cognitive slowing", "no cognitive slowing", "processing speed is unchanged", "processing speed is otherwise unchanged"]

  cog_executive_function:
    type: "status"
    status_field: "cog_executive_function_status"
    evidence_field: "cog_executive_function_evidence"
    present_terms: ["organizing complex tasks", "difficulty organizing", "trouble organizing", "planning difficulty", "difficulty multitasking", "decision making", "judgment", "executive function problems"]
    absent_terms: ["denies executive", "no executive", "denies executive function problems"]

  psych_depression:
    type: "status"
    status_field: "psych_depression_status"
    evidence_field: "psych_depression_evidence"
    present_terms: ["depression", "depressed mood", "worsening depression"]
    absent_terms: ["denies depression", "no depression"]

  psych_anxiety:
    type: "status"
    status_field: "psych_anxiety_status"
    evidence_field: "psych_anxiety_evidence"
    present_terms: ["anxiety", "anxious", "anxious symptoms"]
    absent_terms: ["denies anxiety", "no anxiety"]

  psych_adhd:
    type: "status"
    status_field: "psych_adhd_status"
    evidence_field: "psych_adhd_evidence"
    present_terms: ["adhd", "attention deficit", "attention-deficit"]
    absent_terms: ["denies adhd", "no history of adhd"]

  psych_psychosis:
    type: "status"
    status_field: "psych_psychosis_status"
    evidence_field: "psych_psychosis_evidence"
    present_terms: ["psychosis", "hallucinations", "delusions"]
    absent_terms: ["denies psychosis", "denies hallucinations", "denies delusions", "no psychosis", "no hallucinations", "no delusions"]

  psych_substance_use_disorder:
    type: "status"
    status_field: "psych_substance_use_disorder_status"
    evidence_field: "psych_substance_use_disorder_evidence"
    present_terms: ["substance use disorder", "alcohol use disorder", "substance abuse", "alcohol abuse", "substance dependence", "alcohol dependence"]
    absent_terms: ["denies substance use disorder", "denies alcohol use disorder", "no substance use disorder", "no alcohol use disorder"]

  sudep_generalized_seizures:
    type: "status"
    status_field: "sudep_generalized_seizures_status"
    evidence_field: "sudep_generalized_seizures_evidence"
    present_terms: ["generalized tonic-clonic", "generalized tonic clonic", "convulsive seizure", "convulsive seizures", "bilateral tonic-clonic", "bilateral tonic clonic", "gtc"]
    absent_terms: ["denies generalized tonic-clonic", "no generalized tonic-clonic", "no tonic-clonic", "no convulsive"]

  sudep_living_alone:
    type: "status"
    status_field: "sudep_living_alone_status"
    evidence_field: "sudep_living_alone_evidence"
    present_terms: ["lives alone", "living alone"]
    absent_terms: ["does not live alone", "lives with", "living with"]

  sudep_seizures_during_sleep:
    type: "status"
    status_field: "sudep_seizures_during_sleep_status"
    evidence_field: "sudep_seizures_during_sleep_evidence"
    present_terms: ["during sleep", "out of sleep", "nocturnal", "while sleeping"]
    absent_terms: ["no nocturnal", "no seizures during sleep", "denies seizures during sleep", "denies nocturnal"]

  sudep_longstanding_epilepsy_terms:
    type: "status"
    status_field: "sudep_longstanding_epilepsy_status"
    evidence_field: "sudep_longstanding_epilepsy_evidence"
    present_terms: ["epilepsy since childhood", "since childhood", "for decades", "longstanding epilepsy", "long-standing epilepsy"]
    absent_terms: []

  sudep_male:
    type: "status"
    status_field: "sudep_male_status"
    evidence_field: "sudep_male_evidence"
    present_terms: ["male", "man", "boy"]
    absent_terms: ["female", "woman", "girl"]

  sudep_medication_nonadherence:
    type: "status"
    status_field: "sudep_medication_nonadherence_status"
    evidence_field: "sudep_medication_nonadherence_evidence"
    present_terms: ["missed doses", "missing doses", "nonadherent", "non-adherent", "poor adherence", "ran out of medication"]
    absent_terms: ["no missed doses", "denies missed doses", "excellent medication adherence", "good medication adherence", "adherent"]

  sudep_increasing_seizures:
    type: "status"
    status_field: "sudep_increasing_seizures_status"
    evidence_field: "sudep_increasing_seizures_evidence"
    present_terms: ["increasing seizure", "increased seizure", "worsening seizure", "more seizures", "seizure frequency increased"]
    absent_terms: ["not increasing", "stable over", "remained stable", "seizure frequency is stable", "unchanged"]

  sudep_alcohol_or_substance_use:
    type: "status"
    status_field: "sudep_alcohol_or_substance_use_status"
    evidence_field: "sudep_alcohol_or_substance_use_evidence"
    present_terms: ["alcohol use disorder", "substance use disorder", "alcohol abuse", "substance abuse"]
    absent_terms: ["denies alcohol use disorder", "denies substance use disorder", "no alcohol use disorder", "no substance use disorder"]