  sudep_longstanding_epilepsy_present:
    type: "threshold_status"
    status_field: "sudep_longstanding_epilepsy_status"
    evidence_field: "sudep_longstanding_epilepsy_evidence"
    present:
      sentence_must_contain: ["epilepsy"]
      comparator: ">="
      value: 20
      patterns:
        - "(?:epilepsy|seizures?)\\s+(?:since|for)\\s+(?:more than\\s+|over\\s+|greater than\\s+)?(?P<number>\\d+|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty|thirty|forty|fifty)\\s+years?"
